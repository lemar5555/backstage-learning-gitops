apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/lemar5555/backstage-learning-gitops.git
        revision: main
        directories:
          - path: environments/*/*/*

  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default

      source:
        repoURL: https://github.com/lemar5555/backstage-learning-gitops.git
        targetRevision: main
        path: charts/service
        helm:
          valueFiles:
            - ../../{{path}}/values.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path[2]}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
